[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "pnpm --filter @groundtruth/server start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
# High retry ceiling so a transient RPC 429 storm can't permanently down the
# service (it recovers on restart; the backoff logic prevents re-storming).
restartPolicyMaxRetries = 50
